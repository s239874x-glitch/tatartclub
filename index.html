<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>農工大???部</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
background:#0a6b37;
overflow:hidden;
}


/* 背景 */
body::before{
content:"";
position:fixed;
top:0; left:0;
width:100%; height:100%;
pointer-events:none;
}

/* 🎁 */
#gift{
cursor:pointer;
animation: float 2s infinite;
z-index:30;

display:flex;
flex-direction:column;
align-items:center;
text-align:center;
gap:5px;
}

.tap{
font-size:2em;
color:white;
letter-spacing:2px;
margin:0;
}

#gift:active{
transform: scale(0.9);
}

@keyframes float {
0% { transform: translateY(0); }
50% { transform: translateY(-10px); }
100% { transform: translateY(0); }
}

/* Canvas */
#confetti{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:15;
pointer-events:none;
}

#drawCanvas{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:20;
pointer-events:none;
touch-action:none;
}

/* 中央 */
.box-wrapper{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#uiLayer{
  position:fixed;
  top:20px;     /* ← 上 */
  right:20px;   /* ← 右 */
  z-index:50; /* ← 最強 */

  display:flex;
  flex-direction:column;
  display:none;
}

#uiLayer button{
  padding:10px 15px;     /* ← 大きく */
  font-size:1.0em;       /* ← 見やすく */
  border-radius:12px;

  background:#c0392b;
  color:white;
  border:none;
}

#uiLayer button:active{
  transform:scale(0.95);
}

/* ボックス */
.box{
background:white;
width:90vw;
max-width:700px;
padding:40px;
box-sizing:border-box;

border:12px solid #8b5a2b;
box-shadow:none;

transform:scale(0.5);
opacity:0;
pointer-events:none;
}

.box.active{
animation: pop 0.6s ease-out forwards;
pointer-events:auto;
}

@keyframes pop {
0% { transform: scale(0.5); opacity:0; }
70% { transform: scale(1.1); opacity:1; }
100% { transform: scale(1); opacity:1; }
}

/* テキスト */
h1{
font-size:2.0em;
text-align:center;
margin-bottom:20px;
color:#c0392b;
}

p{
font-size:1.3em;
text-align:center;
line-height:1.7;
}

.small{
font-size:0.7em;
color:gray;
}

/* ボタン */
button{
padding:8px 12px;
margin:5px;
border:none;
border-radius:8px;
background:#c0392b;
color:white;
cursor:pointer;
}
</style>
</head>

<body>
<audio id="se" src="sound.mp3" preload="auto"></audio>
<canvas id="confetti"></canvas>
<canvas id="drawCanvas"></canvas>

<div id="gift">
  <span class="tap"><strong>TAP ME</strong></span>
  <img src="gift.png" crossorigin="anonymous" width="150">
</div>

<div class="box-wrapper">
<div class="box">

<h1>🎉おめでとう！</h1>

<p>
あなたは農工大の<br>
<strong><span style="color:#c0392b;">美術部</span></strong>を見つけました！<br>
<a href="https://x.com/nokoart_active" target="_blank">ツイッター（現X）</a><br>
<a href="https://www.instagram.com/artclub_tuat/" target="_blank">インスタグラム</a>も<br>
フォローしてください！<br>
興味のある方は<br>
<a href="https://www.instagram.com/artclub_tuat/" target="_blank">オープンチャット</a>へ！
</p>

<p class="small">
※ ネタバラシはこっそりおねがいします🤫
</p>

</div>
</div>

<!-- 追加：ボタン専用レイヤー -->
<div id="uiLayer">
  <button id="drawToggle">✏️ 描画できます！</button>
  <button id="clearBtn">🧹クリア</button>
  <button id="shareBtn">📸 保存して共有</button>
</div>


<script>
/* ========= 音 ========= */
const audio = document.getElementById("se");

/* ========= プレゼント ========= */
let opened=false;

const gift = document.getElementById("gift");
const box = document.querySelector(".box");
const uiLayer = document.getElementById("uiLayer");

gift.onclick = ()=>{
if(opened) return;
opened=true;

gift.style.display="none";
box.classList.add("active");
uiLayer.style.display="flex";
// 🔊 音再生
  if(audio){
    audio.currentTime = 0;
    audio.volume = 0.3;
    audio.play().catch(()=>{});
  }

explodeConfetti();
};

/* ========= 共有 ========= */
const shareBtn = document.getElementById("shareBtn");
  
  //シェアボタン消す
shareBtn.onclick = async () => {
  
  const boxEl = document.querySelector(".box");
  const prevTransform = boxEl.style.transform;
  const prevAnimation = boxEl.style.animation;
  
  boxEl.style.transform = "none";
  boxEl.style.animation = "none";
　boxEl.style.opacity = "1";
  
  shareBtn.style.display = "none";
  confettiCanvas.style.display = "none";
  await new Promise(r => setTimeout(r, 50));

  // html2canvas の scale を 1 に
  const screenshot = await html2canvas(document.body, {
    useCORS: true,
    backgroundColor: "#0a6b37",
    scale: 1,
    ignoreElements: (el) =>
      ["confetti","drawCanvas","uiLayer"].includes(el.id)
  });

  // 合成キャンバスを html2canvas と同じ解像度に
  const finalCanvas = document.createElement("canvas");
  finalCanvas.width = screenshot.width;
  finalCanvas.height = screenshot.height;
  const ctx = finalCanvas.getContext("2d");

  // 背景を描画
  ctx.drawImage(screenshot, 0, 0);
  
  ctx.drawImage(
  drawCanvas,
  0,0,drawCanvas.width,drawCanvas.height,
  0,0,finalCanvas.width,finalCanvas.height
 );

　//額縁
　// 木枠
  ctx.lineWidth = 40;
  ctx.strokeStyle = "#8b5a2b";
  ctx.strokeRect(0, 0, finalCanvas.width, finalCanvas.height);

  // 内側の影（立体感）
  ctx.lineWidth = 10;
  ctx.strokeStyle = "rgba(0,0,0,0.3)";
  ctx.strokeRect(20, 20, finalCanvas.width-40, finalCanvas.height-40);


  /*落書きタイトル*/
 const fontSize = Math.min(finalCanvas.width * 0.08, 70);
 ctx.fillStyle = "white";
 ctx.font = `bold ${fontSize}px sans-serif`;
 ctx.textAlign = "center";

 ctx.shadowColor = "black";
 ctx.shadowBlur = 15;
 ctx.fillText("「私の作品」", finalCanvas.width / 2, fontSize + 10);

  const img = finalCanvas.toDataURL("image/png");

  const link = document.createElement("a");
  link.href = img;
  link.download = "art.png";
  link.click();

  confettiCanvas.style.display = "block";
  shareBtn.style.display = "inline-block";
  
  boxEl.style.transform = prevTransform;
  boxEl.style.animation = prevAnimation;
  
  // Twitter 共有
  const text = encodeURIComponent(
    "農工大美術部見つけた！🎨\n（保存したらくがきも一緒に投稿してみよう！）\n#農工大美術部\n"
  );
  
  const url = encodeURIComponent(
  "https://s239874x-glitch.github.io/\nhttps://x.com/nokoart_active"
 );

 window.location.href = `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
};
/* ========= Canvas ========= */
const confettiCanvas = document.getElementById("confetti");
const confettiCtx = confettiCanvas.getContext("2d");

const drawCanvas = document.getElementById("drawCanvas");
const drawCtx = drawCanvas.getContext("2d");

drawCtx.lineJoin = "round";
drawCtx.lineCap = "round";

function resize() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
  drawCanvas.width = window.innerWidth;
  drawCanvas.height = window.innerHeight;

  drawCanvas.style.width = window.innerWidth + "px";
  drawCanvas.style.height = window.innerHeight + "px";
}
resize();
window.addEventListener("resize", resize);

/* ========= 紙吹雪 ========= */
let particles=[];

function explodeConfetti(){
for(let i=0;i<120;i++){
particles.push({
x:confettiCanvas.width/2,
y:confettiCanvas.height/2,
vx:(Math.random()-0.5)*10,
vy:(Math.random()-0.5)*10,
life:100,
color:`hsl(${Math.random()*360},100%,60%)`
});
}
updateConfetti();
}

function updateConfetti(){
confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
p.vy+=0.2;
p.life--;

confettiCtx.fillStyle=p.color;
confettiCtx.fillRect(p.x,p.y,5,5);
});

particles=particles.filter(p=>p.life>0);

if(particles.length>0){
requestAnimationFrame(updateConfetti);
}
}

/* ========= 描画 ========= */
let drawEnabled=false;
let drawing=false;
let hue=0;
let moved = false;

const drawBtn=document.getElementById("drawToggle");
const clearBtn=document.getElementById("clearBtn");

drawBtn.onclick=()=>{
  drawEnabled=!drawEnabled;

  if(drawEnabled){
    drawCanvas.style.pointerEvents="auto";
    drawCanvas.style.zIndex="40";  // ← 最前面に出す
    drawBtn.textContent="✏️ ON";
  }else{
    drawCanvas.style.pointerEvents="none";
    drawCanvas.style.zIndex="20";  // ← 元に戻す
    drawBtn.textContent="✏️ OFF";
  }
};

clearBtn.onclick = ()=>{
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
};

/* PC */
drawCanvas.onmousedown=(e)=>{
  if(!drawEnabled)return;

  drawing=true;
  moved=false;

  const rect=drawCanvas.getBoundingClientRect();
  drawCtx.beginPath();
  drawCtx.moveTo(e.clientX-rect.left,e.clientY-rect.top);
};

drawCanvas.onmousemove=(e)=>{
  if(!drawing)return;

  moved=true;

  const rect=drawCanvas.getBoundingClientRect();
  drawCtx.lineTo(e.clientX-rect.left,e.clientY-rect.top);

  drawCtx.strokeStyle=`hsl(${hue},100%,60%)`;
  hue=(hue + 4) % 360;

  drawCtx.lineWidth=3;
  drawCtx.lineCap="round";
  drawCtx.stroke();
};

drawCanvas.onmouseup=(e)=>{
  drawing=false;

  // ★ここが重要
  if(!moved){
    const el=document.elementFromPoint(e.clientX,e.clientY);
    if(el && el!==drawCanvas) el.click();
  }
};

/* スマホ */
drawCanvas.ontouchstart=(e)=>{
  if(!drawEnabled)return;

  drawing=true;
  moved=false;

  const rect=drawCanvas.getBoundingClientRect();
  const t=e.touches[0];

  drawCtx.beginPath();
  drawCtx.moveTo(t.clientX-rect.left,t.clientY-rect.top);
};

drawCanvas.ontouchmove=(e)=>{
  if(!drawing)return;

  moved=true;
  e.preventDefault();

  const rect=drawCanvas.getBoundingClientRect();
  const t=e.touches[0];

  drawCtx.lineTo(t.clientX-rect.left,t.clientY-rect.top);

  drawCtx.strokeStyle=`hsl(${hue},100%,60%)`;
  hue = (hue + 4) % 360;

  drawCtx.lineWidth=3;
  drawCtx.lineCap="round";
  drawCtx.stroke();
};

drawCanvas.ontouchend=(e)=>{
  drawing=false;
  if(!moved && e.changedTouches){
    const touch=e.changedTouches[0];
    const el=document.elementFromPoint(touch.clientX,touch.clientY);
    if(el && el!==drawCanvas) el.click();
  }
};

</script>
</body>
</html>
