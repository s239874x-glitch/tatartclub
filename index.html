<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>農工大美術部</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:sans-serif;
background:#0a6b37;
overflow:hidden;
}

/* 背景を少し暗くする */
body::before{
content:"";
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.3);
z-index:0;
}

/* 🎁 箱 */
#gift{
font-size:80px;
cursor:pointer;
z-index:1;
animation: float 2s infinite;
transition: transform 0.1s;
}

#gift:active{
transform: scale(0.9);
}

/* 浮遊 */
@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

/* ボックス（最初は隠す） */
.box{
position:relative;
z-index:1;

background:white;
padding:40px;
border-radius:10px;

/* 額縁風 */
border: 12px solid #8b5a2b;
box-shadow:
  0 0 0 4px #d2b48c inset,
  0 10px 30px rgba(0,0,0,0.3);

/* 初期状態 */
opacity:0;
transform: scale(0.5);
pointer-events:none;
}

/* 出現後 */
.box.active{
animation:
  pop 0.6s ease-out forwards,
  shake 0.4s ease-in-out 0.6s,
  floatBox 3s ease-in-out infinite 1s;
pointer-events:auto;
}

/* ポップアウト */
@keyframes pop {
  0% {
    transform: scale(0.5);
    opacity: 0;
  }
  70% {
    transform: scale(1.1);
    opacity: 1;
  }
  100% {
    transform: scale(1);
  }
}

/* 揺れ */
@keyframes shake {
  0% { transform: translate(0, 0) scale(1); }
  20% { transform: translate(-3px, 2px) scale(1.02); }
  40% { transform: translate(3px, -2px) scale(1.02); }
  60% { transform: translate(-2px, 1px) scale(1.01); }
  80% { transform: translate(2px, -1px) scale(1.01); }
  100% { transform: translate(0, 0) scale(1); }
}

/* ふわっと漂う */
@keyframes floatBox {
  0% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
  100% { transform: translateY(0); }
}

/* テキスト */
h1{
font-size:2.5em;
opacity:0;
transform: translateY(10px);
}

p{
font-size:1.3em;
opacity:0;
transform: translateY(10px);
}

/* テキスト出現 */
.box.active h1{
animation: fadeUp 0.5s ease-out 0.4s forwards;
}

.box.active p{
animation: fadeUp 0.5s ease-out 0.6s forwards;
}

@keyframes fadeUp {
  to {
    opacity:1;
    transform: translateY(0);
  }
}

</style>

</head>

<body>

<!-- 🎁 -->
<div id="gift">🎁</div>

<!-- 本体 -->
<div class="box">

<h1>おめでとう！</h1>

<p>
あなたは農工大の美術部を見つけました！<br>
<a href="https://x.com/nokonokoart" target="_blank">ツイッター</a>、  
<a href="https://www.instagram.com/artclub_tuat/" target="_blank">インスタグラム</a>もあります！<br>
</p>

<p style="font-size:0.7em; color:gray;">
※ネタバラシはこっそりおねがいします 🤫
</p>

</div>

<!-- 音 -->
<audio id="se" src="sound.mp3" preload="auto"></audio>

<script>
document.getElementById("gift").addEventListener("click", function(){

  // 箱を消す
  this.style.display = "none";

  const box = document.querySelector(".box");

  // 少し間を置いて出現（重要）
  setTimeout(()=>{
    box.classList.add("active");
  }, 100);

  // 音
  const audio = document.getElementById("se");
  if(audio){
    audio.currentTime = 0;
    audio.play();
  }

  // バイブ（対応端末のみ）
  if(navigator.vibrate){
    navigator.vibrate([100, 50, 100]);
  }

});
</script>

</body>
</html>
