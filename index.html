<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
background:#0a6b37;
overflow:hidden;
}

/* 背景 */
body::before{
content:"";
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.3);
pointer-events:none;
}

/* 🎁 */
#gift{
cursor:pointer;
animation: float 2s infinite;
z-index:10;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;

will-change: transform;
gap:5px;
}
/*紙吹雪ブロック*/
#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:20;

/* 通常はクリック透過 */
pointer-events:none;
touch-action: none;
}

/* テキスト選択無効化 */
body, canvas {
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}
  
.tap{
font-size:2em;
color:white;
letter-spacing:2px;
margin:0;
}

.gift-emoji{
 width: 150px;   /* 好きな幅に調整 */
  height: auto;   /* 縦横比を維持 */
}

#gift:active{
transform: scale(0.9);
}

@keyframes float {
0% { transform: translateY(0); }
50% { transform: translateY(-10px); }
100% { transform: translateY(0); }
}

/* 中央 */
.box-wrapper{
position:absolute;
top:50%;
left:50%;
transform: translate(-50%, -50%);
}

/* ボックス */
.box{
background:white;
width:90vw;
max-width:700px;
padding:40px;
box-sizing:border-box;

border:12px solid #8b5a2b;
box-shadow:
0 0 0 4px #d2b48c inset,
0 10px 30px rgba(0,0,0,0.3);

transform:scale(0.5);
opacity:0;
pointer-events:none;

will-change: transform, opacity;
}

.box.active{
animation: pop 0.6s ease-out forwards;
pointer-events:auto;
}

@keyframes pop {
0% { transform: scale(0.5); opacity:0; }
70% { transform: scale(1.1); opacity:1; }
100% { transform: scale(1); opacity:1; }
}

.box-wrapper.shake{
animation: shake 0.4s ease-in-out;
}

@keyframes shake {
0% { transform: translate(-50%, -50%) translate(0,0); }
20% { transform: translate(-50%, -50%) translate(-4px,2px); }
40% { transform: translate(-50%, -50%) translate(4px,-2px); }
60% { transform: translate(-50%, -50%) translate(-3px,1px); }
80% { transform: translate(-50%, -50%) translate(3px,-1px); }
100% { transform: translate(-50%, -50%) translate(0,0); }
}

/* テキスト */
h1{
font-size:2.5em;
text-align:center;
margin-bottom:20px;
color:#c0392b;
}

p{
font-size:1.3em;
text-align:center;
line-height:1.7;
}

.medium{
font-size:1em;
}

.small{
font-size:0.7em;
color:gray;
}
  
img.emoji{
width:1em;
height:1em;
vertical-align:-0.1em;
vertical-align:middle;
}
  
</style>
</head>

<body>

<canvas id="confetti"></canvas> 
  
<div id="gift">
  <span class="tap"><strong>TAP ME</strong></span>
<img class="gift-emoji" src="gift.png" alt="🎁">
</div>

<div class="box-wrapper">
  <div class="box">

    <h1>おめでとう！</h1>

    <p>
    あなたは農工大の<br>
    <strong><span style="color:#c0392b;">美術部</span></strong>を見つけました！<br>
    <span style="color:#c0392b; text-decoration: underline wavy #c0392b 2px;">
    気になる、質問がある方
    </span><br>
    ↓<br>
    <a href="https://line.me/ti/g2/Ad13QcH-DozH1t8ytUOZIvxddO9GLigwNriJXA?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" target="_blank">
    LINEオープンチャット</a>にて<br>
    イベントを告知します！
    </p>
    
    <p class ="medium">
    <a href="https://x.com/nokoart_active" target="_blank">ツイッター（現X）</a><br>
    <a href="https://www.instagram.com/artclub_tuat/" target="_blank">インスタグラム</a>も<br>
    チェックしてください！<br>
    </p>

    <p class="small">
    ※ ✏️ 長押し or Shift + ドラッグで描けます
    </p>

  </div>
</div>

<audio id="se" src="sound.mp3" preload="auto"></audio>

<script>
let opened = false;

document.getElementById("gift").addEventListener("click", function(){

  if(opened) return;
  opened = true;

  this.style.display = "none";

  const box = document.querySelector(".box");
  const wrapper = document.querySelector(".box-wrapper");

  setTimeout(()=>{
    box.classList.add("active");

    if(window.twemoji){
      twemoji.parse(box);
    }
    explodeConfetti();
    updateConfetti();

    // 3秒後に描画可能
    setTimeout(()=>{
      drawMode = true;
    }, 3000);

  }, 100);

  setTimeout(()=>{
    wrapper.classList.add("shake");
  }, 600);

  const audio = document.getElementById("se");
  if(audio){
    audio.currentTime = 0;
    audio.volume = 0.6;
    audio.play().catch(()=>{});
  }

});

/* ===== Canvas ===== */

const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let drawMode = false;
let drawing = false;
let enableDraw = false;

/* ===== 紙吹雪 ===== */

function explodeConfetti(){
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;

  for(let i=0;i<150;i++){
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 6 + 3;

    particles.push({
      x: centerX,
      y: centerY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: Math.random()*6+4,
      color: `hsl(${Math.random()*360},100%,60%)`,
      life: 150
    });
  }
  requestAnimationFrame(updateConfetti);
}

function updateConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.vx *= 0.99;
    p.vy *= 0.99;
    p.life--;

    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);

    if(p.life <= 0){
      particles.splice(i,1);
    }
  }

  if(particles.length > 0){
    requestAnimationFrame(updateConfetti);
  }
}

/* ===== 描画制御 ===== */

// Shiftキー押してる間だけ描画モードON
document.addEventListener("keydown", (e)=>{
  if(e.key === "Shift"){
    enableDraw = true;
    canvas.style.pointerEvents = "auto";
  }
});

document.addEventListener("keyup", (e)=>{
  if(e.key === "Shift"){
    enableDraw = false;
    canvas.style.pointerEvents = "none";
  }
});

/* ===== マウス描画 ===== */

canvas.addEventListener("mousedown", (e)=>{
  if(!drawMode || !enableDraw) return;
  drawing = true;

  const rect = canvas.getBoundingClientRect();
  ctx.beginPath();
  ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
});

canvas.addEventListener("mousemove", (e)=>{
  if(!drawing || !drawMode) return;
　e.preventDefault(); // ←これも重要
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);

  ctx.strokeStyle = "white";
  ctx.lineWidth = 3;
  ctx.lineCap = "round";
  ctx.stroke();
});

canvas.addEventListener("mouseup", ()=>{
  drawing = false;
});

canvas.addEventListener("mouseleave", ()=>{
  drawing = false;
});

/* ===== スマホ（長押しで描画） ===== */

let touchTimer;

canvas.addEventListener("touchstart", (e)=>{
  e.preventDefault(); // ←これ重要
  if(!drawMode) return;

  touchTimer = setTimeout(()=>{
    enableDraw = true;
    canvas.style.pointerEvents = "auto";
    drawing = true;

    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];

    ctx.beginPath();
    ctx.moveTo(t.clientX - rect.left, t.clientY - rect.top);

  }, 300); // 長押し判定
});

canvas.addEventListener("touchmove", (e)=>{
  if(!drawing || !enableDraw) return;

  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];

  ctx.lineTo(t.clientX - rect.left, t.clientY - rect.top);
  ctx.strokeStyle = "white";
  ctx.lineWidth = 3;
  ctx.lineCap = "round";
  ctx.stroke();
});

canvas.addEventListener("touchend", ()=>{
  clearTimeout(touchTimer);
  drawing = false;
  enableDraw = false;
  canvas.style.pointerEvents = "none";
});
</script>

</body>
</html>
